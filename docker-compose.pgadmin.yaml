version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: mon-postgres
    environment:
      POSTGRES_USER: oliver
      POSTGRES_PASSWORD: shnr31161
      POSTGRES_DB: secops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: mon-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: solofonore@gmail.com
      PGADMIN_DEFAULT_PASSWORD: shnr31161
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  pgadmin_data:
